<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双仓分区仓库出入库管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fa;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 22px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .user-info { font-size: 14px; }
        .btn-logout {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar {
            width: 220px;
            background: white;
            padding: 20px 0;
            border-right: 1px solid #e8e8e8;
        }
        .menu-item {
            padding: 15px 25px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.3s;
        }
        .menu-item:hover, .menu-item.active {
            background: #f0f2ff;
            border-left-color: #667eea;
            color: #667eea;
        }
        .content { flex: 1; padding: 25px; }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-success {
            background: #52c41a;
            color: white;
        }
        .btn-danger {
            background: #ff4d4f;
            color: white;
        }
        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            background: #fafafa;
            color: #666;
            font-weight: 500;
        }
        tr:hover { background: #fafafa; }
        .status-tag {
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-approved { background: #f6ffed; color: #52c41a; }
        .status-rejected { background: #fff2f0; color: #ff4d4f; }
        .status-done { background: #e6f7ff; color: #1890ff; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            max-width: 90%;
        }
        .modal-title {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .form-row {
            margin-bottom: 15px;
        }
        .form-row label {
            display: block;
            margin-bottom: 6px;
            color: #333;
        }
        .form-row input, .form-row select, .form-row textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .form-row textarea { resize: vertical; min-height: 80px; }
        .modal-footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .btn-default {
            background: #f0f0f0;
            color: #333;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>双仓分区仓库出入库管理系统</h1>
        <div class="header-right">
            <span class="user-info" id="userInfo"></span>
            <button class="btn-logout" onclick="doLogout()">退出</button>
        </div>
    </div>
    <div class="container">
        <div class="sidebar" id="sidebar"></div>
        <div class="content" id="content"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        let currentUser = null;
        let products = [];
        let warehouses = [];

        async function init() {
            try {
                const res = await fetch('/api/current_user');
                currentUser = await res.json();
                document.getElementById('userInfo').textContent = currentUser.name + '（' + currentUser.role + '）';
                renderSidebar();
                loadData();
            } catch (e) {
                window.location.href = '/login';
            }
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            let menus = [];
            
            if (currentUser.role === '大仓管理员') {
                menus = [
                    { id: 'dashboard', name: '工作台' },
                    { id: 'purchase', name: '大仓采购入库' },
                    { id: 'applications', name: '小仓申请审核' },
                    { id: 'inventory', name: '实时库存查询' },
                    { id: 'products', name: '商品管理' },
                    { id: 'logs', name: '操作流水' }
                ];
            } else if (currentUser.role === '小仓操作员') {
                menus = [
                    { id: 'dashboard', name: '工作台' },
                    { id: 'apply', name: '申请管理' },
                    { id: 'outorder', name: '出库管理' },
                    { id: 'inventory', name: '库存查询' },
                    { id: 'logs', name: '操作记录' }
                ];
            } else if (currentUser.role === '审核人') {
                menus = [
                    { id: 'dashboard', name: '工作台' },
                    { id: 'purchase', name: '采购单审核' },
                    { id: 'applications', name: '申请审核' },
                    { id: 'outorder', name: '出库审核' },
                    { id: 'inventory', name: '库存查询' },
                    { id: 'products', name: '商品管理' },
                    { id: 'logs', name: '操作流水' }
                ];
            }
            
            let html = '';
            for (let i = 0; i < menus.length; i++) {
                const m = menus[i];
                html += '<div class="menu-item ' + (i === 0 ? 'active' : '') + '" onclick="switchPage(\'' + m.id + '\')">' + m.name + '</div>';
            }
            sidebar.innerHTML = html;
            
            switchPage(menus[0].id);
        }

        async function loadData() {
            const pRes = await fetch('/api/products');
            const wRes = await fetch('/api/warehouses');
            products = await pRes.json();
            warehouses = await wRes.json();
        }

        function switchPage(pageId) {
            const items = document.querySelectorAll('.menu-item');
            items.forEach(el => {
                el.classList.remove('active');
                const attr = el.getAttribute('onclick');
                if (attr && attr.indexOf('switchPage(\'' + pageId) >= 0) {
                    el.classList.add('active');
                }
            });
            
            const content = document.getElementById('content');
            
            switch(pageId) {
                case 'dashboard': renderDashboard(content); break;
                case 'purchase': renderPurchase(content); break;
                case 'applications': renderApplications(content); break;
                case 'apply': renderApply(content); break;
                case 'outorder': renderOutOrder(content); break;
                case 'inventory': renderInventory(content); break;
                case 'products': renderProducts(content); break;
                case 'logs': renderLogs(content); break;
            }
        }

        async function renderDashboard(container) {
            container.innerHTML = '\
                <div class="stats-grid">\
                    <div class="stat-card">\
                        <div class="stat-value" id="stat1">-</div>\
                        <div class="stat-label">待审核单据</div>\
                    </div>\
                    <div class="stat-card">\
                        <div class="stat-value" id="stat2">-</div>\
                        <div class="stat-label">商品种类</div>\
                    </div>\
                    <div class="stat-card">\
                        <div class="stat-value" id="stat3">-</div>\
                        <div class="stat-label">仓库数量</div>\
                    </div>\
                    <div class="stat-card">\
                        <div class="stat-value" id="stat4">-</div>\
                        <div class="stat-label">今日操作</div>\
                    </div>\
                </div>\
                <div class="card">\
                    <div class="card-title">欢迎使用</div>\
                    <p style="color: #666;">系统已初始化完成，可正常使用各项功能。</p>\
                </div>\
            ';
            document.getElementById('stat2').textContent = products.length;
            document.getElementById('stat3').textContent = warehouses.length;
            
            const logsRes = await fetch('/api/logs');
            const logs = await logsRes.json();
            document.getElementById('stat4').textContent = logs.length;
            
            let pending = 0;
            if (currentUser.role !== '小仓操作员') {
                const appsRes = await fetch('/api/applications');
                const apps = await appsRes.json();
                pending += apps.filter(function(a) { return a.status === '待审核'; }).length;
                
                const posRes = await fetch('/api/purchase_orders');
                const pos = await posRes.json();
                pending += pos.filter(function(p) { return p.status === '待审核'; }).length;
            }
            document.getElementById('stat1').textContent = pending;
        }

        async function renderPurchase(container) {
            const res = await fetch('/api/purchase_orders');
            const orders = await res.json();
            
            let html = '\
                <div class="card">\
                    <div class="card-title">大仓采购入库单</div>\
                    <div class="toolbar">';
            if (currentUser.role === '大仓管理员') {
                html += '<button class="btn btn-primary" onclick="showAddPurchase()">+ 新建采购单</button>';
            }
            html += '\
                    </div>\
                    <div class="table-container">\
                        <table>\
                            <thead><tr><th>单号</th><th>供应商</th><th>商品</th><th>数量</th><th>状态</th><th>审核数量</th><th>驳回原因</th><th>创建人</th><th>创建时间</th><th>操作</th></tr></thead>\
                            <tbody>';
            
            for (let i = 0; i < orders.length; i++) {
                const o = orders[i];
                html += '<tr>';
                html += '<td>' + o.order_no + '</td>';
                html += '<td>' + o.supplier + '</td>';
                html += '<td>' + o.product_name + '</td>';
                html += '<td>' + o.quantity + '</td>';
                const cls = o.status === '待审核' ? 'status-pending' : o.status === '已通过' ? 'status-approved' : 'status-rejected';
                html += '<td><span class="status-tag ' + cls + '">' + o.status + '</span></td>';
                html += '<td>' + (o.audit_quantity || '-') + '</td>';
                html += '<td>' + (o.reject_reason || '-') + '</td>';
                html += '<td>' + (o.creator_name || '') + '</td>';
                html += '<td>' + o.created_at + '</td>';
                if (o.status === '待审核' && currentUser.role !== '小仓操作员') {
                    html += '<td><button class="btn btn-success" style="padding:4px 10px;font-size:12px;" onclick="showAuditPurchase(' + o.id + ',' + o.quantity + ')">审核</button></td>';
                } else {
                    html += '<td>-</td>';
                }
                html += '</tr>';
            }
            
            html += '</tbody></table></div></div>';
            container.innerHTML = html;
        }

        function showAddPurchase() {
            let productOptions = '';
            for (let i = 0; i < products.length; i++) {
                productOptions += '<option value="' + products[i].id + '">' + products[i].name + '</option>';
            }
            
            document.getElementById('modalContent').innerHTML = '\
                <div class="modal-title">新建大仓采购入库单</div>\
                <div class="form-row"><label>供应商</label><input type="text" id="supplier"></div>\
                <div class="form-row"><label>商品</label><select id="productId">' + productOptions + '</select></div>\
                <div class="form-row"><label>数量</label><input type="number" id="quantity"></div>\
                <div class="modal-footer">\
                    <button class="btn btn-default" onclick="closeModal()">取消</button>\
                    <button class="btn btn-primary" onclick="addPurchase()">提交</button>\
                </div>\
            ';
            document.getElementById('modal').classList.add('active');
        }

        async function addPurchase() {
            const data = {
                supplier: document.getElementById('supplier').value,
                product_id: parseInt(document.getElementById('productId').value),
                quantity: parseInt(document.getElementById('quantity').value)
            };
            const res = await fetch('/api/purchase_orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                switchPage('purchase');
            }
        }

        function showAuditPurchase(id, qty) {
            document.getElementById('modalContent').innerHTML = '\
                <div class="modal-title">审核采购单</div>\
                <div class="form-row"><label>审核数量</label><input type="number" id="auditQty" value="' + qty + '"></div>\
                <div class="form-row"><label>操作</label><select id="auditAction"><option value="approve">通过</option><option value="reject">驳回</option></select></div>\
                <div class="form-row" id="reasonRow" style="display:none;"><label>驳回原因</label><textarea id="rejectReason"></textarea></div>\
                <div class="modal-footer">\
                    <button class="btn btn-default" onclick="closeModal()">取消</button>\
                    <button class="btn btn-primary" onclick="auditPurchase(' + id + ')">提交</button>\
                </div>\
            ';
            document.getElementById('auditAction').addEventListener('change', function(e) {
                document.getElementById('reasonRow').style.display = e.target.value === 'reject' ? 'block' : 'none';
            });
            document.getElementById('modal').classList.add('active');
        }

        async function auditPurchase(id) {
            const action = document.getElementById('auditAction').value;
            const data = {
                action: action,
                audit_quantity: parseInt(document.getElementById('auditQty').value),
                reject_reason: document.getElementById('rejectReason') ? document.getElementById('rejectReason').value : ''
            };
            const res = await fetch('/api/purchase_orders/' + id + '/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                switchPage('purchase');
            }
        }

        async function renderApplications(container) {
            const res = await fetch('/api/applications');
            const apps = await res.json();
            
            let html = '\
                <div class="card">\
                    <div class="card-title">小仓申请审核</div>\
                    <div class="table-container">\
                        <table>\
                            <thead><tr><th>单号</th><th>类型</th><th>小仓</th><th>商品</th><th>数量</th><th>状态</th><th>原因/来源</th><th>创建时间</th><th>操作</th></tr></thead>\
                            <tbody>';
            
            for (let i = 0; i < apps.length; i++) {
                const a = apps[i];
                html += '<tr>';
                html += '<td>' + a.app_no + '</td>';
                html += '<td>' + a.type + '</td>';
                html += '<td>' + a.warehouse_name + '</td>';
                html += '<td>' + a.product_name + '</td>';
                html += '<td>' + a.quantity + '</td>';
                const cls = a.status === '待审核' ? 'status-pending' : a.status === '已通过' ? 'status-approved' : 'status-rejected';
                html += '<td><span class="status-tag ' + cls + '">' + a.status + '</span></td>';
                html += '<td>' + (a.reason || a.source || '-') + '</td>';
                html += '<td>' + a.created_at + '</td>';
                if (a.status === '待审核') {
                    html += '<td><button class="btn btn-success" style="padding:4px 10px;font-size:12px;" onclick="showAuditApplication(' + a.id + ',' + a.quantity + ')">审核</button></td>';
                } else {
                    html += '<td>' + (a.reject_reason || '-') + '</td>';
                }
                html += '</tr>';
            }
            
            html += '</tbody></table></div></div>';
            container.innerHTML = html;
        }

        function showAuditApplication(id, qty) {
            document.getElementById('modalContent').innerHTML = '\
                <div class="modal-title">审核申请单</div>\
                <div class="form-row"><label>审核数量</label><input type="number" id="auditQty" value="' + qty + '"></div>\
                <div class="form-row"><label>操作</label><select id="auditAction"><option value="approve">通过</option><option value="reject">驳回</option></select></div>\
                <div class="form-row" id="reasonRow" style="display:none;"><label>驳回原因</label><textarea id="rejectReason"></textarea></div>\
                <div class="modal-footer">\
                    <button class="btn btn-default" onclick="closeModal()">取消</button>\
                    <button class="btn btn-primary" onclick="auditApplication(' + id + ')">提交</button>\
                </div>\
            ';
            document.getElementById('auditAction').addEventListener('change', function(e) {
                document.getElementById('reasonRow').style.display = e.target.value === 'reject' ? 'block' : 'none';
            });
            document.getElementById('modal').classList.add('active');
        }

        async function auditApplication(id) {
            const action = document.getElementById('auditAction').value;
            const data = {
                action: action,
                audit_quantity: parseInt(document.getElementById('auditQty').value),
                reject_reason: document.getElementById('rejectReason') ? document.getElementById('rejectReason').value : ''
            };
            const res = await fetch('/api/applications/' + id + '/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                switchPage('applications');
            }
        }

        async function renderApply(container) {
            const res = await fetch('/api/applications');
            const apps = await res.json();
            
            container.innerHTML = '\
                <div class="card">\
                    <div class="card-title">我的申请</div>\
                    <div class="toolbar">\
                        <button class="btn btn-primary" onclick="showAddApply(\'要货\')">+ 要货申请</button>\
                        <button class="btn btn-primary" onclick="showAddApply(\'退库\')">+ 退库申请</button>\
                        <button class="btn btn-primary" onclick="showAddApply(\'入库\')">+ 入库申请</button>\
                    </div>\
                    <div class="table-container">\
                        <table>\
                            <thead><tr><th>单号</th><th>类型</th><th>商品</th><th>数量</th><th>状态</th><th>原因/来源</th><th>创建时间</th><th>驳回原因</th></tr></thead>\
                            <tbody id="applyList"></tbody>\
                        </table>\
                    </div>\
                </div>\
            ';
            
            let tbodyHtml = '';
            for (let i = 0; i < apps.length; i++) {
                const a = apps[i];
                tbodyHtml += '<tr>';
                tbodyHtml += '<td>' + a.app_no + '</td>';
                tbodyHtml += '<td>' + a.type + '</td>';
                tbodyHtml += '<td>' + a.product_name + '</td>';
                tbodyHtml += '<td>' + a.quantity + '</td>';
                const cls = a.status === '待审核' ? 'status-pending' : a.status === '已通过' ? 'status-approved' : 'status-rejected';
                tbodyHtml += '<td><span class="status-tag ' + cls + '">' + a.status + '</span></td>';
                tbodyHtml += '<td>' + (a.reason || a.source || '-') + '</td>';
                tbodyHtml += '<td>' + a.created_at + '</td>';
                tbodyHtml += '<td>' + (a.reject_reason || '-') + '</td>';
                tbodyHtml += '</tr>';
            }
            document.getElementById('applyList').innerHTML = tbodyHtml;
        }

        function showAddApply(type) {
            let productOptions = '';
            for (let i = 0; i < products.length; i++) {
                productOptions += '<option value="' + products[i].id + '">' + products[i].name + '</option>';
            }
            
            let extraHtml = '';
            if (type === '要货') {
                extraHtml = '<div class="form-row"><label>期望到货日期</label><input type="date" id="expectDate"></div><div class="form-row"><label>备注</label><textarea id="reason"></textarea></div>';
            } else if (type === '退库') {
                extraHtml = '<div class="form-row"><label>退库原因</label><textarea id="reason"></textarea></div>';
            } else if (type === '入库') {
                extraHtml = '<div class="form-row"><label>货物来源</label><input type="text" id="source"></div>';
            }
            
            document.getElementById('modalContent').innerHTML = '\
                <div class="modal-title">新建' + type + '申请</div>\
                <div class="form-row"><label>商品</label><select id="productId">' + productOptions + '</select></div>\
                <div class="form-row"><label>数量</label><input type="number" id="quantity"></div>\
                ' + extraHtml + '\
                <div class="modal-footer">\
                    <button class="btn btn-default" onclick="closeModal()">取消</button>\
                    <button class="btn btn-primary" onclick="addApply(\'' + type + '\')">提交</button>\
                </div>\
            ';
            document.getElementById('modal').classList.add('active');
        }

        async function addApply(type) {
            const data = {
                type: type,
                product_id: parseInt(document.getElementById('productId').value),
                quantity: parseInt(document.getElementById('quantity').value)
            };
            if (type === '要货') {
                data.expect_date = document.getElementById('expectDate') ? document.getElementById('expectDate').value : '';
                data.reason = document.getElementById('reason') ? document.getElementById('reason').value : '';
            } else if (type === '退库') {
                data.reason = document.getElementById('reason') ? document.getElementById('reason').value : '';
            } else if (type === '入库') {
                data.source = document.getElementById('source') ? document.getElementById('source').value : '';
            }
            
            const res = await fetch('/api/applications', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                switchPage('apply');
            }
        }

        async function renderOutOrder(container) {
            const res = await fetch('/api/out_orders');
            const orders = await res.json();
            
            let html = '\
                <div class="card">\
                    <div class="card-title">出库管理</div>\
                    <div class="toolbar">';
            if (currentUser.role === '小仓操作员') {
                html += '<button class="btn btn-primary" onclick="showAddOutOrder()">+ 新建出库单</button>';
            }
            html += '\
                    </div>\
                    <div class="table-container">\
                        <table>\
                            <thead><tr><th>单号</th><th>仓库</th><th>商品</th><th>数量</th><th>来源</th><th>状态</th><th>创建人</th><th>创建时间</th><th>操作</th></tr></thead>\
                            <tbody>';
            
            for (let i = 0; i < orders.length; i++) {
                const o = orders[i];
                html += '<tr>';
                html += '<td>' + o.order_no + '</td>';
                html += '<td>' + o.warehouse_name + '</td>';
                html += '<td>' + o.product_name + '</td>';
                html += '<td>' + o.quantity + '</td>';
                html += '<td>' + (o.source || '-') + '</td>';
                const cls = o.status === '待审核' ? 'status-pending' : o.status === '已通过' ? 'status-approved' : o.status === '已驳回' ? 'status-rejected' : 'status-done';
                html += '<td><span class="status-tag ' + cls + '">' + o.status + '</span></td>';
                html += '<td>' + (o.creator_name || '') + '</td>';
                html += '<td>' + o.created_at + '</td>';
                if (o.status === '待审核' && currentUser.role !== '小仓操作员') {
                    html += '<td><button class="btn btn-success" style="padding:4px 10px;font-size:12px;" onclick="showAuditOutOrder(' + o.id + ')">审核</button></td>';
                } else {
                    html += '<td>' + (o.reject_reason || '-') + '</td>';
                }
                html += '</tr>';
            }
            
            html += '</tbody></table></div></div>';
            container.innerHTML = html;
        }

        function showAddOutOrder() {
            let productOptions = '';
            for (let i = 0; i < products.length; i++) {
                productOptions += '<option value="' + products[i].id + '">' + products[i].name + '</option>';
            }
            
            document.getElementById('modalContent').innerHTML = '\
                <div class="modal-title">新建出库单</div>\
                <div class="form-row"><label>商品</label><select id="productId">' + productOptions + '</select></div>\
                <div class="form-row"><label>数量</label><input type="number" id="quantity"></div>\
                <div class="form-row"><label>来源</label><input type="text" id="source"></div>\
                <div class="modal-footer">\
                    <button class="btn btn-default" onclick="closeModal()">取消</button>\
                    <button class="btn btn-primary" onclick="addOutOrder()">提交</button>\
                </div>\
            ';
            document.getElementById('modal').classList.add('active');
        }

        async function addOutOrder() {
            const data = {
                product_id: parseInt(document.getElementById('productId').value),
                quantity: parseInt(document.getElementById('quantity').value),
                source: document.getElementById('source') ? document.getElementById('source').value : ''
            };
            const res = await fetch('/api/out_orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                switchPage('outorder');
            }
        }

        function showAuditOutOrder(id) {
            document.getElementById('modalContent').innerHTML = '\
                <div class="modal-title">审核出库单</div>\
                <div class="form-row"><label>操作</label><select id="auditAction"><option value="approve">通过</option><option value="reject">驳回</option></select></div>\
                <div class="form-row" id="reasonRow" style="display:none;"><label>驳回原因</label><textarea id="rejectReason"></textarea></div>\
                <div class="modal-footer">\
                    <button class="btn btn-default" onclick="closeModal()">取消</button>\
                    <button class="btn btn-primary" onclick="auditOutOrder(' + id + ')">提交</button>\
                </div>\
            ';
            document.getElementById('auditAction').addEventListener('change', function(e) {
                document.getElementById('reasonRow').style.display = e.target.value === 'reject' ? 'block' : 'none';
            });
            document.getElementById('modal').classList.add('active');
        }

        async function auditOutOrder(id) {
            const action = document.getElementById('auditAction').value;
            const data = {
                action: action,
                reject_reason: document.getElementById('rejectReason') ? document.getElementById('rejectReason').value : ''
            };
            const res = await fetch('/api/out_orders/' + id + '/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                switchPage('outorder');
            }
        }

        async function renderInventory(container) {
            const res = await fetch('/api/inventory');
            const inv = await res.json();
            
            let html = '\
                <div class="card">\
                    <div class="card-title">实时库存查询</div>\
                    <div class="table-container">\
                        <table>\
                            <thead><tr><th>仓库</th><th>商品编码</th><th>商品名称</th><th>规格</th><th>单位</th><th>库存数量</th></tr></thead>\
                            <tbody>';
            
            for (let i = 0; i < inv.length; i++) {
                const item = inv[i];
                html += '<tr>';
                html += '<td>' + item.warehouse_name + '</td>';
                html += '<td>' + item.product_code + '</td>';
                html += '<td>' + item.product_name + '</td>';
                html += '<td>' + (item.product_spec || '-') + '</td>';
                html += '<td>' + item.product_unit + '</td>';
                html += '<td>' + item.quantity + '</td>';
                html += '</tr>';
            }
            
            html += '</tbody></table></div></div>';
            container.innerHTML = html;
        }

        async function renderProducts(container) {
            let html = '\
                <div class="card">\
                    <div class="card-title">商品管理</div>\
                    <div class="toolbar">\
                        <button class="btn btn-primary" onclick="showAddProduct()">+ 新增商品</button>\
                    </div>\
                    <div class="table-container">\
                        <table>\
                            <thead><tr><th>编码</th><th>名称</th><th>单位</th><th>规格</th><th>保质期(月)</th></tr></thead>\
                            <tbody>';
            
            for (let i = 0; i < products.length; i++) {
                const p = products[i];
                html += '<tr>';
                html += '<td>' + p.code + '</td>';
                html += '<td>' + p.name + '</td>';
                html += '<td>' + p.unit + '</td>';
                html += '<td>' + (p.spec || '-') + '</td>';
                html += '<td>' + (p.shelf_life || '-') + '</td>';
                html += '</tr>';
            }
            
            html += '</tbody></table></div></div>';
            container.innerHTML = html;
        }

        function showAddProduct() {
            document.getElementById('modalContent').innerHTML = '\
                <div class="modal-title">新增商品</div>\
                <div class="form-row"><label>商品编码</label><input type="text" id="code"></div>\
                <div class="form-row"><label>商品名称</label><input type="text" id="name"></div>\
                <div class="form-row"><label>单位</label><input type="text" id="unit"></div>\
                <div class="form-row"><label>规格</label><input type="text" id="spec"></div>\
                <div class="form-row"><label>保质期(月)</label><input type="number" id="shelfLife"></div>\
                <div class="modal-footer">\
                    <button class="btn btn-default" onclick="closeModal()">取消</button>\
                    <button class="btn btn-primary" onclick="addProduct()">提交</button>\
                </div>\
            ';
            document.getElementById('modal').classList.add('active');
        }

        async function addProduct() {
            const data = {
                code: document.getElementById('code').value,
                name: document.getElementById('name').value,
                unit: document.getElementById('unit').value,
                spec: document.getElementById('spec') ? document.getElementById('spec').value : '',
                shelf_life: parseInt(document.getElementById('shelfLife') ? document.getElementById('shelfLife').value : 0)
            };
            const res = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                await loadData();
                switchPage('products');
            }
        }

        async function renderLogs(container) {
            const res = await fetch('/api/logs');
            const logs = await res.json();
            
            let html = '\
                <div class="card">\
                    <div class="card-title">操作流水</div>\
                    <div class="table-container">\
                        <table>\
                            <thead><tr><th>操作人</th><th>操作类型</th><th>详情</th><th>关联单号</th><th>时间</th></tr></thead>\
                            <tbody>';
            
            for (let i = 0; i < logs.length; i++) {
                const l = logs[i];
                html += '<tr>';
                html += '<td>' + l.user_name + '</td>';
                html += '<td>' + l.action + '</td>';
                html += '<td>' + l.detail + '</td>';
                html += '<td>' + (l.order_no || '-') + '</td>';
                html += '<td>' + l.created_at + '</td>';
                html += '</tr>';
            }
            
            html += '</tbody></table></div></div>';
            container.innerHTML = html;
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function doLogout() {
            await fetch('/logout');
            window.location.href = '/login';
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        init();
    </script>
</body>
</html>
